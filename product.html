<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Товар | LORD VOLDEMORT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background-color: #1a1a1a;
            color: #d4af37;
            min-height: 100vh;
        }

        nav {
            background-color: #2c2c2c;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d4af37;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #d4af37;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

            .nav-menu a {
                color: #d4af37;
                text-decoration: none;
                transition: color 0.3s;
            }

                .nav-menu a:hover {
                    color: #fff;
                }

        .cart-icon {
            font-size: 1.2em;
            cursor: pointer;
            color: #d4af37;
            text-decoration: none;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 2rem;
            color: #888;
            text-decoration: none;
            transition: color 0.3s;
        }

            .btn-back:hover {
                color: #d4af37;
            }

        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 2rem;
            background-color: #2c2c2c;
            padding: 3rem;
            border-radius: 10px;
            border: 1px solid #d4af37;
        }

        .product-image {
            text-align: center;
        }

            .product-image img {
                width: 100%;
                max-width: 500px;
                border-radius: 10px;
                border: 3px solid #d4af37;
                box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            }

        .product-info h1 {
            font-size: 2.5em;
            margin-bottom: 1rem;
            color: #fff;
        }

        .product-price {
            font-size: 2em;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .product-description {
            font-size: 1.2em;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 2rem;
            padding: 1.5rem;
            background-color: #1a1a1a;
            border-radius: 10px;
            border-left: 4px solid #d4af37;
        }

        .product-specs {
            background-color: #1a1a1a;
            padding: 1.5rem;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

            .product-specs h2 {
                color: #d4af37;
                margin-bottom: 1rem;
                font-size: 1.5em;
                border-bottom: 2px solid #d4af37;
                padding-bottom: 0.5rem;
            }

            .product-specs ul {
                list-style: none;
                padding: 0;
            }

            .product-specs li {
                padding: 0.7rem 0;
                color: #aaa;
                border-bottom: 1px solid #444;
                display: flex;
            }

                .product-specs li:last-child {
                    border-bottom: none;
                }

                .product-specs li strong {
                    color: #fff;
                    min-width: 200px;
                }

        .btn-magic {
            background: #740001;
            color: white;
            border: none;
            padding: 1rem 2rem;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
            transition: 0.3s;
            font-weight: bold;
            width: 100%;
        }

            .btn-magic:hover {
                background: #d4af37;
                color: #000;
            }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid #444;
        }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="platform.html" class="logo">LORD VOLDEMORT</a>
            <ul class="nav-menu">
                <li><a href="platform.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="blog.html">Пророк</a></li>
                <li><a href="contacts.html">Совиная почта</a></li>
            </ul>
        </div>
        <div style="display: flex; align-items: center;">
            <a href="cart.html" class="cart-icon"> <span id="cartCount">0</span></a>
        </div>
    </nav>

    <div class="container">
        <a href="catalog.html" class="btn-back">← Вернуться в каталог</a>

        <div class="product-detail">
            <div class="product-image">
                <img id="product-img" src="" alt="Товар">
            </div>

            <div class="product-info">
                <h1 id="product-title">Загрузка...</h1>
                <div id="product-price" class="product-price">0 галлеонов</div>

                <div id="product-description" class="product-description">
                    Описание загружается...
                </div>

                <div class="product-specs">
                    <h2>Характеристики</h2>
                    <ul id="product-specs-list">
                        <li>Загрузка...</li>
                    </ul>
                </div>

                <button id="add-to-cart-btn" class="btn-magic">Добавить в корзину</button>
            </div>
        </div>
    </div>

    <footer>
        <p>© покровская софья тот еще дамлдор</p>
    </footer>

                ]

            6: {
                id: 6,
                title: "Шар предсказаний",
                price: 1500,
               
                image: "https://i.pinimg.com/736x/5e/6f/7a/5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b.jpg",

                    { label: "Материал", value: "Горный хрусталь" },
                    { label: "Диаметр", value: "30 см" },
                    { label: "Вес", value: "5 кг" },

                    { label: "Происхождение", value: "Индия, Тибет" }
                ]
            }
        };

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        function addToCart(name, price, image) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ name, price, image, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert('✅ ' + name + ' добавлен в корзину!');
        }

        window.onload = function () {
            updateCartCount();

            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));
            const product = productsDB[productId];

            if (product) {
                document.getElementById('product-img').src = product.image;
                document.getElementById('product-img').alt = product.title;
                document.getElementById('product-title').innerText = product.title;
                document.getElementById('product-price').innerText = product.price + ' галлеонов';
                document.getElementById('product-description').innerText = product.description;

                const specsList = document.getElementById('product-specs-list');
                specsList.innerHTML = '';
                product.specs.forEach(spec => {
                    const li = document.createElement('li');
                    li.innerHTML = '<strong>' + spec.label + ':</strong> <span>' + spec.value + '</span>';
                    specsList.appendChild(li);
                });

                document.getElementById('add-to-cart-btn').onclick = function () {
                    addToCart(product.title, product.price, product.image);
                };

                document.title = product.title + ' | LORD VOLDEMORT';
            } else {
                document.querySelector('.container').innerHTML = `
                            <div style="text-align: center; padding: 5rem;">
                                <h1 style="font-size: 3em; margin-bottom: 1rem; color: #d4af37;">😕 Товар не найден</h1>
                                <p style="font-size: 1.2em; color: #888; margin-bottom: 2rem;">
                                    К сожалению, такой товар не существует или был удален
                                </p>
                                <a href="catalog.html" class="btn-magic" style="display: inline-block; text-decoration: none; width: auto;">
                                    Вернуться в каталог
                                </a>
                            </div>
                        `;
            }
        };
    </script>
</body>
</html>
