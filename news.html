<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новость | Ежедневный Пророк</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            background-color: #1a1a1a;
            color: #d4af37;
            min-height: 100vh;
        }

        nav {
            background-color: #2c2c2c;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #d4af37;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: #d4af37;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

            .nav-menu a {
                color: #d4af37;
                text-decoration: none;
                transition: color 0.3s;
            }

                .nav-menu a:hover {
                    color: #fff;
                }

        .cart-icon {
            font-size: 1.2em;
            cursor: pointer;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: #d4af37;
            text-decoration: none;
        }

            .back-link:hover {
                text-decoration: underline;
            }

        .news-article img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 2rem;
        }

        .news-article h1 {
            font-size: 2.5em;
            margin-bottom: 1rem;
            color: #d4af37;
        }

        .date {
            color: #888;
            font-size: 1.1em;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #444;
        }

        .content {
            font-size: 1.2em;
            line-height: 1.8;
        }

            .content p {
                margin-bottom: 1.5rem;
            }

        .share-section {
            margin-top: 3rem;
            padding: 2rem;
            background-color: #2c2c2c;
            border-radius: 10px;
            text-align: center;
        }

            .share-section h3 {
                margin-bottom: 1rem;
            }

        .share-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .share-btn {
            background-color: #d4af37;
            color: #1a1a1a;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            transition: background 0.3s;
        }

            .share-btn:hover {
                background-color: #b5952f;
            }

        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid #444;
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="platform.html" class="logo">LORD VOLDEMORT</a>
            <ul class="nav-menu">
                <li><a href="platform.html">Главная</a></li>
                <li><a href="catalog.html">Каталог</a></li>
                <li><a href="blog.html">Пророк</a></li>
                <li><a href="contacts.html">Совиная почта</a></li>
            </ul>
        </div>
        <a href="cart.html" class="cart-icon">🛒 <span id="cartCount">0</span></a>
    </nav>

    <div class="container">
        <a href="blog.html" class="back-link">← Назад к новостям</a>

        <article class="news-article" id="newsArticle"></article>

        <div class="share-section">
            <h3>Поделиться новостью</h3>
            <p>Расскажите друзьям об этой новости!</p>
            <div class="share-buttons">
                <button class="share-btn" onclick="copyLink()">📋 Копировать ссылку</button>
                <a href="share.html" class="share-btn">📱 QR-код</a>
            </div>
        </div>
    </div>

    <footer>
        <p>© покровская софья тот еще дамлдор.</p>
    </footer>

    <script>
        const newsData = {
            1: {
                title: "Побег из Азкабана?",
                date: "12 июня 2026",
                image: "https://avatars.mds.yandex.net/i?id=7ac6392c0fa5d18f396c9d02073ac718_l-12928559-images-thumbs&n=13",
                content: "<p>Министерство магии сообщает о тревожных событиях, произошедших минувшей ночью в тюрьме Азкабан. По предварительным данным, одному из заключенных удалось покинуть территорию крепости.</p><p>Стражи Азкабана, дементоры, были обнаружены в состоянии повышенной активности. Представитель Министерства отказался комментировать детали инцидента, заявив лишь, что 'ситуация находится под контролем'.</p><p>Авроры проводят расследование. Всем волшебникам рекомендуется соблюдать бдительность и сообщать о любых подозрительных активностях.</p><p>Мы будем следить за развитием событий и сообщать последние новости.</p>"
            },
            2: {
                title: "Новая метла от Firebolt",
                date: "10 июня 2026",
                image: "https://avatars.mds.yandex.net/get-mpic/5240772/2a0000018ae2735300dd5e2402c6583eb878/orig",
                content: "<p>Компания Firebolt анонсировала выпуск революционной модели метлы, которая обещает изменить представление о скоростном полете.</p><p>Новая модель, получившая название Firebolt Ultra, способна развивать скорость до 200 миль в час. Это абсолютный рекорд в мире магического транспорта.</p><p>По словам разработчиков, метла оснащена новейшей системой стабилизации и защиты от неблагоприятных погодных условий. Первые экземпляры поступят в продажу уже в следующем месяце.</p><p>Цена новинки составит 5000 галлеонов, что делает ее самой дорогой метлой в истории квиддича.</p>"
            }
        };

        function loadNews() {
            const urlParams = new URLSearchParams(window.location.search);
            const newsId = urlParams.get('id');
            const news = newsData[newsId];

            if (!news) {
                document.getElementById('newsArticle').innerHTML = '<h1>Новость не найдена</h1>';
                return;
            }

            document.getElementById('newsArticle').innerHTML =
                '<img src="' + news.image + '" alt="' + news.title + '">' +
                '<h1>' + news.title + '</h1>' +
                '<div class="date">' + news.date + '</div>' +
                '<div class="content">' + news.content + '</div>';

            document.title = news.title + ' | Ежедневный Пророк';
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('Ссылка скопирована!');
            });
        }

        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        loadNews();
        updateCartCount();
    </script>
</body>
</html>
